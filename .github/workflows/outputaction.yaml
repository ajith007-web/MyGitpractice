name: output-workflow
on: workflow_dispatch
jobs:
    job1:
      runs-on: ubuntu-latest
      outputs:
        shared_output: ${{steps.step1.outputs.myoutput}}
      steps:
        - name: step1
          id: step1
          run: |
            echo "myoutput=hi this is step 1 in job1" >> $GITHUB_OUTPUT
        - name: step2
          run: |
            echo  "this is by step1 ${{steps.step1.outputs.myoutput}}"
    
    job2:
      runs-on: ubuntu-latest
      needs: job1
      steps:
        - name: step1
          run: |
           echo "this is job2 getting msg from job1 which is ${{needs.job1.outputs.shared_output}}"