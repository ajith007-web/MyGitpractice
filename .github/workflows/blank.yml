name: myworkflow
on: 
  # push:
  #   branches: 
  #     - main
  # pull_request:
  #   branches:
  #     - main
  workflow_dispatch:
    inputs:
      name:
        description: 'Name of the person'
        required: true
        type: string
        default: 'John Doe'


jobs:
  running_commands:
    runs-on: ubuntu-latest
    steps:
      - name: run checkout
        uses: actions/checkout@v7
      - name: run commands
        run: ls -lrt
      - name: run echo
        run: echo "actions created by ${{inputs.name}}"
  

